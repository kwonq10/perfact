<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スキマ</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <header class="app-header">
      <h1>スキマ</h1>
    </header>

    <main>
      <section id="authView" aria-labelledby="authHeading">
        <h2 id="authHeading">ログイン</h2>
        <button id="loginBtn" type="button">Googleでログイン</button>
        <p class="login-description">Googleカレンダーと連携して、空き時間を検索します</p>
      </section>

      <section id="accountSection" hidden aria-label="アカウント">
        <p id="connectedInfo" class="login-info">Googleカレンダーに接続しました</p>
        <div class="account-actions">
          <button id="switchAccountBtn" type="button">アカウントを切り替える</button>
          <button id="logoutBtn" type="button">ログアウト</button>
        </div>
      </section>

      <div id="status" role="status" aria-live="polite"></div>

      <div id="dayView" hidden>
        <section class="conditions">
          <button
            id="conditionsToggle"
            type="button"
            aria-expanded="false"
            aria-controls="conditionsPanel"
          >▼ 検索条件</button>

          <div id="conditionsPanel" hidden>
            <fieldset>
              <legend>対象カレンダー</legend>
              <label for="allCalendars">
                <input id="allCalendars" type="checkbox" checked>
                全カレンダー
              </label>
              <div id="calendarList" aria-live="polite"></div>
            </fieldset>

            <label for="duration">必要な空き時間</label>
            <select id="duration">
              <option value="30">30分</option>
              <option value="60">60分</option>
              <option value="90">90分</option>
              <option value="120">120分</option>
            </select>
          </div>
        </section>

        <section class="search-range" aria-label="検索期間">
          <p class="search-range-heading">検索期間</p>

          <div id="customRangeInputs">
            <label for="customStartDate">開始日</label>
            <input id="customStartDate" type="date">
            <label for="customEndDate">終了日</label>
            <input id="customEndDate" type="date">
          </div>

          <div class="preset-buttons" role="group" aria-label="期間プリセット">
            <button id="presetTodayBtn" type="button" class="preset-btn">今日</button>
            <button id="presetThisWeekBtn" type="button" class="preset-btn">今週</button>
            <button id="presetNextWeekBtn" type="button" class="preset-btn">来週</button>
            <button id="presetThisMonthBtn" type="button" class="preset-btn">今月</button>
            <button id="presetNextMonthBtn" type="button" class="preset-btn">来月</button>
          </div>
        </section>

        <button id="searchBtn" type="button">
          <span class="search-icon" aria-hidden="true"></span>空き時間を検索する
        </button>

        <nav class="date-navigation" aria-label="表示日の移動">
          <button id="prevWeekBtn" type="button" class="nav-prev-week">↑ 前週</button>
          <button id="prevDayBtn" type="button" class="nav-prev-day">← 前日</button>
          <div class="nav-center">
            <h2 id="displayDate"></h2>
            <span id="todayBadge" hidden>今日</span>
          </div>
          <button id="nextDayBtn" type="button" class="nav-next-day">→ 翌日</button>
          <button id="nextWeekBtn" type="button" class="nav-next-week">↓ 翌週</button>
        </nav>

        <p id="periodPosition" class="period-position" hidden></p>
        <p id="periodBoundaryMessage" class="period-boundary-message" aria-live="polite"></p>

        <section id="results" aria-label="空き時間" aria-live="polite"></section>
        <button id="copyAllBtn" type="button" hidden>この日の空き枠を一括コピー</button>
      </div>
    </main>

    <footer class="privacy-footer">
      <a
        href="https://kwonq10.github.io/sukima-extension-privacy/"
        target="_blank"
        rel="noopener"
      >プライバシーポリシー</a>
    </footer>

    <div id="extensionToast" class="extension-toast" role="status" aria-live="polite"></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
